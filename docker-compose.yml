
services:
  www:
    image: ghcr.io/soruly/trace.moe-www:latest
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_ENDPOINT=${NEXT_PUBLIC_API_ENDPOINT}
    ports:
      - "${WWW_PORT}:3000"
    networks:
      - anime_finder_net

  api:
    image: ghcr.io/soruly/trace.moe-api:latest
    depends_on:
      liresolr:
        condition: service_started
      mysql:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - VIDEO_PATH=/app/video/
      - HASH_PATH=/app/hash/
      - TRACE_API_SALT=${TRACE_API_SALT}
      - TRACE_ACCURACY=${TRACE_ACCURACY}
      - MAX_WORKER=${MAX_WORKER}
      # point at Solr by service name
      - SOLA_SOLR_LIST=http://liresolr:8983/solr/
      - SOLA_SOLR_SIZE=1
      - PORT=${API_PORT}
      - DEBUG=trace.moe:*
      - SERVER_PORT=3000
      - SOLA_DB_PROVIDER=mysql
      - SOLA_DB_HOST=mysql
      - SOLA_DB_PORT=3306
      - SOLA_DB_USER=${MYSQL_USER}
      - SOLA_DB_PWD=${MYSQL_PASSWORD}
      - SOLA_DB_NAME=${MYSQL_DATABASE}
    ports:
      - "${API_PORT}:3000"
    volumes:
      - type: bind
        source: ${VIDEO_PATH}
        target: /app/video/
      - type: bind
        source: ${HASH_PATH}
        target: /app/hash/
      - /app/node_modules
    networks:
      - anime_finder_net

fastapi:
  image: tiangolo/uvicorn-gunicorn-fastapi:python3.10
  container_name: anime_finder_fastapi
  restart: unless-stopped
  env_file:
    - .env                  # contains DB_*, REDIS_*, APP_PORT=8046, etc. :contentReference[oaicite:7]{index=7}
  volumes:
    - ./anime_audio_backend:/app
  depends_on:
    mysql:
      condition: service_healthy
    liresolr:
      condition: service_started
  ports:
    - "${APP_PORT}:80"      # e.g. APP_PORT=8046 :contentReference[oaicite:9]{index=9}
  networks:
    - anime_finder_net


  mysql:    image: mariadb:10.5
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -u${MYSQL_USER} -p${MYSQL_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - anime_finder_net

  liresolr:
    image: ghcr.io/soruly/liresolr:latest
    command: solr-precreate cl_0 /opt/solr/server/solr/configsets/liresolr
    restart: unless-stopped
    environment:
      - SOLR_JAVA_OPTS=-XX:MaxDirectMemorySize=1g -Djna.nosys=true
    ports:
      - "${SOLR_PORT}:8983"
    volumes:
      - ./liresolr:/opt/solr/server/solr/configsets/liresolr
    shm_size: 1gb
    mem_limit: 1gb

    healthcheck:
      disable: true

    networks:
      - anime_finder_net

  static-ui:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./static-ui:/usr/share/nginx/html:ro
    networks:
      - anime_finder_net

networks:
  anime_finder_net:
    driver: bridge

volumes:
  mysql_data:
  solr_data:
