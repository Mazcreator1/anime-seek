# ============================================================
# anime-seek.conf (Docker nginx-proxy)
# - Uses Cloudflare Origin Cert (origin.pem / origin.key)
# - Proxies to Docker service names (www, api, fastapi)
# - IMPORTANT: API CORS is handled by Node ONLY (nginx emits none)
# ============================================================

# ---------------------------
# HTTP -> HTTPS redirect
# ---------------------------
server {
    listen 80;
    server_name anime-seek.com www.anime-seek.com api.anime-seek.com;
    return 301 https://$host$request_uri;
}

# ============================================================
# Main HTTPS site (anime-seek.com + www)
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name anime-seek.com www.anime-seek.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # Sensible defaults
    client_max_body_size 25m;
    proxy_read_timeout   1800s;
    proxy_send_timeout   1800s;
    send_timeout         1800s;

    # --------------------------------------------------------
    # /search on main host:
    # - Redirect to api subdomain
    # - Do NOT emit CORS here
    # --------------------------------------------------------
    location = /search {
        return 308 https://api.anime-seek.com$request_uri;
    }

    # --------------------------------------------------------
    # Static uploads served by FastAPI under /uploads/
    # (No CORS here; same-origin from anime-seek.com)
    # --------------------------------------------------------
    location ^~ /uploads/ {
        proxy_pass         http://anime_finder_fastapi:8047/fastapi/uploads/;
        proxy_http_version 1.1;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        proxy_set_header   Range              $http_range;
        proxy_set_header   If-Range           $http_if_range;

        proxy_buffering    off;

        expires            7d;
        add_header         Cache-Control "public, max-age=604800, immutable" always;
    }

    # --------------------------------------------------------
    # Preview assets from Node API (api service) under main host
    # (No CORS here; same-origin from anime-seek.com)
    # --------------------------------------------------------
    location ^~ /image/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        proxy_buffering    on;
        expires            1h;
    }

    location ^~ /video/ {
        proxy_pass               http://api:3000;
        proxy_http_version       1.1;

        proxy_set_header         Host               $host;
        proxy_set_header         X-Real-IP          $remote_addr;
        proxy_set_header         X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto  $scheme;

        proxy_buffering          off;
        proxy_request_buffering  off;
    }

    # --------------------------------------------------------
    # FIX: Explicit cancel endpoint (exact match)
    # This avoids any prefix rewrite weirdness and is easy to debug.
    # --------------------------------------------------------
    location = /fastapi/cancel-subscription {
        proxy_pass              http://anime_finder_fastapi:8047/cancel-subscription;
        proxy_http_version      1.1;

        proxy_connect_timeout   60s;
        proxy_send_timeout      1800s;
        proxy_read_timeout      1800s;
        send_timeout            1800s;

        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;

        # Pass auth through (Bearer)
        proxy_set_header        Authorization      $http_authorization;

        # Keep your prefix metadata (FastAPI root_path="/fastapi")
        proxy_set_header        X-Script-Name      /fastapi;
        proxy_set_header        X-Forwarded-Prefix /fastapi;

        proxy_redirect          off;
        proxy_buffering         off;
        proxy_request_buffering off;

        # Don't "helpfully" retry / mask upstream resets
        proxy_next_upstream     off;
    }

    # --------------------------------------------------------
    # FastAPI app under /fastapi
    # --------------------------------------------------------
    location ^~ /fastapi/ {
        proxy_pass              http://anime_finder_fastapi:8047/;
        proxy_http_version      1.1;

        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;

        proxy_set_header        Authorization      $http_authorization;

        proxy_set_header        X-Script-Name      /fastapi;
        proxy_set_header        X-Forwarded-Prefix /fastapi;

        proxy_redirect          off;
        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_next_upstream     off;
    }

    location = /fastapi/openapi.json {
        proxy_pass         http://anime_finder_fastapi:8047/openapi.json;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        proxy_next_upstream off;
    }

    location ^~ /fastapi/generated_characters/ {
    proxy_pass         http://anime_finder_fastapi:8047/fastapi/generated_characters/;
    proxy_http_version 1.1;

    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;

    proxy_buffering    off;

    expires            7d;
    add_header         Cache-Control "public, max-age=604800, immutable" always;

    proxy_next_upstream off;
}
    # --------------------------------------------------------
    # Next.js frontend (www service)
    # --------------------------------------------------------
    location / {
        proxy_pass                http://www:3000;
        proxy_http_version        1.1;

        proxy_set_header          Host               $host;
        proxy_set_header          Upgrade            $http_upgrade;
        proxy_set_header          Connection         "upgrade";
        proxy_set_header          X-Forwarded-Proto  $scheme;
        proxy_set_header          X-Real-IP          $remote_addr;
        proxy_set_header          X-Forwarded-For    $proxy_add_x_forwarded_for;

        proxy_buffering           off;
        proxy_request_buffering   off;

        proxy_next_upstream       off;
    }
}

# ============================================================
# API subdomain (api.anime-seek.com)
# - NO CORS HEADERS HERE (Node handles CORS)
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name api.anime-seek.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    client_max_body_size 25m;

    # /search (long timeouts)
    location = /search {
        proxy_pass             http://api:3000/search;
        proxy_http_version     1.1;

        proxy_connect_timeout  1800s;
        proxy_send_timeout     1800s;
        proxy_read_timeout     1800s;
        send_timeout           1800s;

        proxy_set_header       Host               $host;
        proxy_set_header       X-Real-IP          $remote_addr;
        proxy_set_header       X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto  $scheme;
        proxy_set_header       Authorization      $http_authorization;

        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_next_upstream     off;
    }

    # /image and /video on API subdomain too (optional)
    location ^~ /image/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        proxy_buffering    on;
        expires            1h;

        proxy_next_upstream off;
    }

    location ^~ /video/ {
        proxy_pass               http://api:3000;
        proxy_http_version       1.1;

        proxy_set_header         Host               $host;
        proxy_set_header         X-Real-IP          $remote_addr;
        proxy_set_header         X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto  $scheme;

        proxy_buffering          off;
        proxy_request_buffering  off;

        proxy_next_upstream      off;
    }

    # Fallback: proxy anything else to Node API
    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_next_upstream off;
    }
}
