<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 2em auto; }
    input, button { width: 100%; padding: 0.5em; margin: 0.5em 0; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h2>Forgot Password</h2>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% elif success %}
    <p class="success">{{ success }}</p>
  {% endif %}

  <form
    method="post"
    action="/fastapi/auth/forgot-password"
  >
    <label>
      Your email address:
      <input
        type="email"
        name="email"
        required
        placeholder="you@example.com"
      />
    </label>

    <button type="submit">Send reset link</button>
  </form>
</body>
</html>
